name: Release soil

on:
  push:
    paths:
      - 'soil/**'
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: soil-linux-x86_64
            binary: soil
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: soil-macos-x86_64
            binary: soil
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: soil-macos-arm64
            binary: soil
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: soil-windows-x86_64.exe
            binary: soil.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build soil
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: soil

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: soil/target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Soil nightly
          tag_name: nightly
          prerelease: true
          files: release-artifacts/*
          fail_on_unmatched_files: true
